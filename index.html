  .cs-next .cs-deal {
    margin-top:14px; display:block; width:100%; background:#f7f5e1; color:#1b1b1b;
    font-family:'Monoton',cursive; font-weight:400; padding:10px 16px; border-radius:0; font-size:16px;

  .cs-live {
    display:inline-block; margin-left:8px; background:#e53935; color:#fff;
    font-size:11px; font-weight:800; letter-spacing:1px; padding:2px 8px;
    border-radius:6px; vertical-align:middle;
  }

  .cs-up { margin-top:18px; }
  .cs-up h3 { font-size:14px; letter-spacing:2px; color:#666; margin-bottom:10px; }
  .cs-row {
    display:flex; justify-content:space-between; align-items:center;
    background:#fff; border:1px solid #eee; border-radius:12px;
    padding:14px 16px; margin-bottom:8px;

  .cs-row .cs-t { font-weight:700; color:#222; }

  .cs-empty { color:#777; text-align:center; padding:8px; }

  var DEAL        = "🍺 $25 Dollar Pitchers all game long";
  var LIVE_MS     = 2.5 * 60 * 60 * 1000;
  var UPCOMING_N  = 4;
  var TZ          = "America/New_York";

  var fmt = new Intl.DateTimeFormat("en-US", {
    timeZone: TZ, weekday:"short", month:"short", day:"numeric",
    hour:"numeric", minute:"2-digit"
  });

  function label(iso){
    var parts = {};
    fmt.formatToParts(new Date(iso)).forEach(function(p){ parts[p.type]=p.value; });
    return parts.weekday+" "+parts.month+" "+parts.day+" · "+
           parts.hour+":"+parts.minute+" "+parts.dayPeriod;
  }

  function esc(s){ return String(s).replace(/[&<>]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]; }); }

  function render(){
    var now = Date.now();
    var live = MATCHES.filter(function(m){ return new Date(m.iso).getTime() <= now &&
                                                  new Date(m.iso).getTime()+LIVE_MS > now; })
                      .sort(function(a,b){ return new Date(a.iso)-new Date(b.iso); });
    var future = MATCHES.filter(function(m){ return new Date(m.iso).getTime() > now; })
                        .sort(function(a,b){ return new Date(a.iso)-new Date(b.iso); });

    var hero = live[0] || future[0];
    var rest = (live[0] ? future : future.slice(1)).slice(0, UPCOMING_N);

    var html = "";
    if (hero){
      var isLive = !!live[0];
      html += '<div class="cs-next">'
            +   '<div class="cs-tag">'+(isLive?"LIVE NOW":"NEXT MATCH")+(hero.stage?' · '+esc(hero.stage):'')+'</div>'

            +   '<div class="cs-deal">'+esc(DEAL)+'</div>'
            + '</div>';
    } else {
      html += '<div class="cs-next"><div class="cs-tag">SCHEDULE</div>'
            + '<div class="cs-teams">Season Complete</div>'
            + '<div class="cs-deal">'+esc(DEAL)+'</div></div>';
    }

    html += '<div class="cs-up"><h3>UPCOMING</h3>';
    if (rest.length){
      rest.forEach(function(m){
        html += '<div class="cs-row"><span class="cs-t">'+esc(m.teams)+'</span>'
              + '<span class="cs-d">'+label(m.iso)+'</span></div>';
      });
    } else {
      html += '<div class="cs-empty">No more upcoming matches.</div>';
    }
    html += '</div>';

    document.getElementById("cs-app").innerHTML = html;
  }

  function safeRender(){
    try { render(); }
    catch(e){ document.getElementById("cs-app").innerHTML =
      '<div style="padding:16px;color:#900;font:14px sans-serif">JS error: '+esc(e.message)+'</div>'; }
  }
  safeRender();
  setInterval(safeRender, 30000);
})();
